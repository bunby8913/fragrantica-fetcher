<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fragrantica Fetcher</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body data-page="{{ page }}">
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">{{ 'Wishlist' if page == 'wishlist' else 'Perfume Library' }}</p>
        </div>
        <nav class="page-nav" aria-label="Page navigation">
          <a class="{{ 'active' if page == 'library' else '' }}" href="/">Library</a>
          <a class="{{ 'active' if page == 'wishlist' else '' }}" href="/wishlist">Wishlist</a>
          <a id="logout-link" href="/login">Logout</a>
        </nav>
      </section>

      <section class="card" aria-label="Perfume database table">
        <div class="table-toolbar">
          <div>
            <h2>{{ 'Wishlist' if page == 'wishlist' else 'Saved Perfumes' }}</h2>
            <p id="status" class="status">Loading database...</p>
          </div>
          <label class="search-field">
            <span>Search</span>
            <input id="table-search" type="search" placeholder="Search by name, brand, or notes..." autocomplete="off">
          </label>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="sortable" data-sort="name" scope="col">Name <span class="sort-indicator"></span></th>
                <th class="sortable" data-sort="brand" scope="col">Brand <span class="sort-indicator"></span></th>
                <th>Pyramid</th>
                {% if page == 'library' %}
                <th class="sortable" data-sort="rating" scope="col">Rating <span class="sort-indicator"></span></th>
                <th>Note</th>
                {% endif %}
                <th class="sortable" data-sort="creation_date" scope="col">Created <span class="sort-indicator"></span></th>
                <th>URL</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="perfume-table-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <section class="sticky-add-bar" aria-label="Add perfume">
      <form id="add-perfume-form" class="add-form">
        <input
          id="perfume-url"
          name="url"
          type="text"
          inputmode="url"
          placeholder="Paste one or more fragrantica.com perfume URLs, separated by commas..."
          autocomplete="off"
          required
        >
        <button type="submit">{{ 'Add to Wishlist' if page == 'wishlist' else 'Add Perfume' }}</button>
      </form>
    </section>

    <script>const PAGE = "{{ page }}";</script>
    <script src="{{ url_for('static', filename='auth.js') }}"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
