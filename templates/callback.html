<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Authenticating - Fragrantica Fetcher</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-card">
        <p class="eyebrow">Fragrantica Fetcher</p>
        <h1>Authenticating</h1>
        <p id="callback-status" class="status">Completing login...</p>
        <a id="retry-link" href="/login" class="auth-button-link" style="display: none;">Try Again</a>
      </section>
    </main>

    <script src="{{ url_for('static', filename='auth.js') }}"></script>
    <script src="{{ url_for('static', filename='callback.js') }}"></script>
  </body>
</html>
