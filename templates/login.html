<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Fragrantica Fetcher</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-card">
        <p class="eyebrow">Fragrantica Fetcher</p>
        <h1>Sign in</h1>
        <p id="login-status" class="status">Authenticate with Keycloak to continue.</p>
        <button id="login-button" class="auth-button" type="button">Login with Keycloak</button>
        <a id="reset-link" href="#" class="auth-text-link">Clear session</a>
      </section>
    </main>

    <script src="{{ url_for('static', filename='auth.js') }}"></script>
    <script src="{{ url_for('static', filename='login.js') }}"></script>
  </body>
</html>
